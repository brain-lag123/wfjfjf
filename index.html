<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ENEM Study — Gamificado</title>
  <link rel="stylesheet" href="css/style.css">
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>

<header>
  <div class="container header-inner">
    <a class="logo">
      <span class="logo-icon">⚡</span>
      <span>ENEM</span> Study
    </a>
    <div class="header-stats">
      <span class="header-stat" id="streak-display" style="display:none">
        🔥 <span class="num" id="streak-count">0</span>
      </span>
      <span class="header-stat">
        🎯 <span class="num" id="header-accuracy">—</span>
      </span>
      <span class="header-stat">
        📚 <span class="num" id="header-topics">0/0</span>
      </span>
      <span class="header-stat">
        ⭐ <span class="num" id="header-xp">0 XP</span>
      </span>
      <button class="theme-toggle" data-action="toggle-theme" title="Alternar tema">🌙</button>
    </div>
  </div>
</header>

<main class="container">
  <div id="zona-risco-bar" class="alert-bar" style="display:none"></div>

  <nav>
    <button data-action="tab" data-tab="dashboard" class="active">📊 Painel</button>
    <button data-action="tab" data-tab="assuntos">📚 Assuntos</button>
    <button data-action="tab" data-tab="cronograma">📋 Cronograma</button>
    <button data-action="tab" data-tab="conquistas">🏆 Conquistas</button>
  </nav>

  <div id="tab-dashboard" class="tabs-content active"></div>
  <div id="tab-assuntos" class="tabs-content"></div>
  <div id="tab-cronograma" class="tabs-content"></div>
  <div id="tab-conquistas" class="tabs-content"></div>
</main>

<div id="study-modal" class="modal-overlay" data-action="overlay-click">
  <div class="modal">
    <button class="modal-close" data-action="close-modal">&times;</button>
    <h2><span id="modal-topic-name"></span></h2>
    <p style="color:var(--text3);font-size:0.82rem;margin-bottom:14px" id="modal-topic-category"></p>

    <div id="modal-current-elo" style="margin-bottom:14px"></div>
    <div id="questions-preview" style="margin-bottom:14px"></div>
    <div id="fluency-alert"></div>

    <div class="form-group">
      <label>📝 Registrar questões</label>
      <div class="study-input-row">
        <input type="number" id="q-correct" min="0" placeholder="Acertos">
        <input type="number" id="q-total" min="1" placeholder="Total">
        <button class="btn btn-warning" data-action="log-questions">Salvar</button>
      </div>
    </div>

    <div class="form-group">
      <label>🎯 Nível de dificuldade percebido</label>
      <div class="difficulty-btns">
        <button class="difficulty-btn easy" data-action="set-difficulty" data-value="easy">😊 Fácil</button>
        <button class="difficulty-btn medium" data-action="set-difficulty" data-value="medium">🤔 Médio</button>
        <button class="difficulty-btn hard" data-action="set-difficulty" data-value="hard">😰 Difícil</button>
      </div>
    </div>

    <div style="margin-top:18px;padding-top:14px;border-top:1px solid var(--border)">
      <button class="btn btn-outline btn-sm" data-action="reset-topic" style="color:var(--danger);border-color:var(--danger)">↺ Resetar progresso deste tópico</button>
    </div>
  </div>
</div>

<div id="config-modal" class="modal-overlay" data-action="overlay-click">
  <div class="modal">
    <button class="modal-close" data-action="close-modal">&times;</button>
    <h2>⚙️ Configurar Cronograma</h2>

    <div class="form-group">
      <label>📅 Data da prova</label>
      <input type="date" id="exam-date">
    </div>
    <div class="form-group">
      <label>⏱ Horas disponíveis por dia</label>
      <input type="number" id="exam-hours" min="0.5" step="0.5" value="2">
    </div>
    <div class="form-group">
      <label>📅 Dias da semana que vai estudar</label>
      <div class="day-checkboxes">
        <label class="day-checkbox"><input type="checkbox" class="exam-day" value="0"> Dom</label>
        <label class="day-checkbox"><input type="checkbox" class="exam-day" value="1" checked> Seg</label>
        <label class="day-checkbox"><input type="checkbox" class="exam-day" value="2" checked> Ter</label>
        <label class="day-checkbox"><input type="checkbox" class="exam-day" value="3" checked> Qua</label>
        <label class="day-checkbox"><input type="checkbox" class="exam-day" value="4" checked> Qui</label>
        <label class="day-checkbox"><input type="checkbox" class="exam-day" value="5" checked> Sex</label>
        <label class="day-checkbox"><input type="checkbox" class="exam-day" value="6"> Sáb</label>
      </div>
    </div>
    <button class="btn btn-primary" data-action="save-config">Salvar</button>

    <hr style="margin:18px 0;border-color:var(--border)">

    <button class="btn btn-danger" data-action="reset">🔄 Resetar Todo Progresso</button>
  </div>
</div>

<div id="crono-subtopic-modal" class="modal-overlay" data-action="overlay-click">
  <div class="modal">
    <button class="modal-close" data-action="close-modal">&times;</button>
    <h2><span id="crono-subtopic-name"></span></h2>
    <p style="color:var(--text3);font-size:0.82rem;margin-bottom:14px" id="crono-subtopic-category"></p>

    <div id="crono-subtopic-elo" style="margin-bottom:14px"></div>
    <div id="crono-subtopic-questions-preview" style="margin-bottom:14px"></div>
    <div id="crono-subtopic-fluency-alert"></div>

    <div id="crono-subtopic-list" style="margin: 14px 0"></div>

    <div class="form-group">
      <label>🎯 Nível de dificuldade percebido</label>
      <div class="difficulty-btns">
        <button class="difficulty-btn easy" data-action="set-difficulty" data-value="easy">😊 Fácil</button>
        <button class="difficulty-btn medium" data-action="set-difficulty" data-value="medium">🤔 Médio</button>
        <button class="difficulty-btn hard" data-action="set-difficulty" data-value="hard">😰 Difícil</button>
      </div>
    </div>

    <div class="form-group">
      <label>📝 Registrar questões</label>
      <div class="study-input-row">
        <input type="number" id="crono-q-correct" min="0" placeholder="Acertos">
        <input type="number" id="crono-q-total" min="1" placeholder="Total">
        <button class="btn btn-warning" data-action="crono-log-questions">Salvar</button>
      </div>
    </div>

    <div style="margin-top:18px;padding-top:14px;border-top:1px solid var(--border)">
      <button class="btn btn-outline btn-sm" data-action="reset-topic" style="color:var(--danger);border-color:var(--danger)">↺ Resetar progresso deste tópico</button>
    </div>
  </div>
</div>

<div id="xp-toast" class="toast" style="display:none">
  <span class="toast-icon">⭐</span>
  <div class="toast-text">
    <div class="toast-title" id="toast-title">+25 XP</div>
    <div class="toast-desc" id="toast-desc">Parabéns!</div>
  </div>
</div>

<div id="category-modal" class="modal-overlay" data-action="overlay-click">
  <div class="modal">
    <button class="modal-close" data-action="close-modal">&times;</button>
    <h2>Nova Matéria</h2>
    <div class="form-group">
      <label>Nome da matéria</label>
      <input type="text" id="category-name" placeholder="Ex: Português">
    </div>
    <div class="form-group">
      <label>Ícone (emoji)</label>
      <input type="text" id="category-icon" placeholder="Ex: 📖" maxlength="4">
    </div>
    <button class="btn btn-primary" data-action="save-category">Salvar</button>
  </div>
</div>

<div id="topic-modal" class="modal-overlay" data-action="overlay-click">
  <div class="modal">
    <button class="modal-close" data-action="close-modal">&times;</button>
    <h2>Novo Tópico</h2>
    <div class="form-group">
      <label>Matéria</label>
      <select id="topic-category"></select>
    </div>
    <div class="form-group">
      <label>Nome do tópico</label>
      <input type="text" id="topic-name" placeholder="Ex: Frações">
    </div>
    <div class="form-group study-input-row">
      <div><label>Horas estimadas</label><input type="number" id="topic-est-hours" min="0.5" step="0.5" value="2"></div>
      <div><label>Peso (1-10)</label><input type="number" id="topic-weight" min="1" max="10" value="5"></div>
      <div><label>Recorrência (0-100)</label><input type="number" id="topic-recurrence" min="0" max="100" value="50"></div>
    </div>
    <div class="form-group">
      <label>Subtópicos (um por linha)</label>
      <textarea id="topic-subtopics" rows="4" placeholder="Subtópico 1&#10;Subtópico 2&#10;Subtópico 3"></textarea>
    </div>
    <button class="btn btn-primary" data-action="save-topic">Salvar</button>
  </div>
</div>

<div id="topic-modal-edit" class="modal-overlay" data-action="overlay-click">
  <div class="modal">
    <button class="modal-close" data-action="close-modal">&times;</button>
    <h2>Editar Tópico</h2>
    <div class="form-group">
      <label>Nome do tópico</label>
      <input type="text" id="topic-edit-name">
    </div>
    <div class="form-group study-input-row">
      <div><label>Horas estimadas</label><input type="number" id="topic-edit-est-hours" min="0.5" step="0.5"></div>
      <div><label>Peso (1-10)</label><input type="number" id="topic-edit-weight" min="1" max="10"></div>
      <div><label>Recorrência (0-100)</label><input type="number" id="topic-edit-recurrence" min="0" max="100"></div>
    </div>
    <div class="form-group">
      <label>Subtópicos (um por linha)</label>
      <textarea id="topic-edit-subtopics" rows="4"></textarea>
    </div>
    <button class="btn btn-primary" data-action="save-topic">Salvar</button>
  </div>
</div>

<script src="js/data.js"></script>
<script src="js/app.js"></script>
</body>
</html>
